<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modpaper AI | Sovereign Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #FF00FF;
      --pink-dim: rgba(255, 0, 255, 0.15);
      --pink-glow: rgba(255, 0, 255, 0.35);
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 110%, rgba(255,0,255,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% -10%, rgba(100,0,255,0.06) 0%, transparent 60%);
    }

    .bg::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .stage {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: clamp(52px, 8vw, 88px);
      font-weight: 800;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.7s cubic-bezier(0.19,1,0.22,1) 0.1s forwards;
    }
    .brand em { color: var(--pink); font-style: normal; }

    #status {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 56px;
      height: 16px;
      transition: color 0.5s;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.19,1,0.22,1) 0.2s forwards;
    }
    #status.pink { color: var(--pink); }
    #status.dim  { color: rgba(255,255,255,0.15); }

    #startBtn {
      position: relative;
      background: #fff; color: #000;
      border: none; border-radius: 100px;
      padding: 22px 72px;
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.19,1,0.22,1), box-shadow 0.4s;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.19,1,0.22,1) 0.35s forwards;
    }
    #startBtn:not(:disabled):hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px var(--pink-glow);
    }
    #startBtn:not(:disabled):active { transform: scale(0.97) translateY(0); }
    #startBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    #startBtn.connecting::before {
      content: '';
      position: absolute; inset: -5px;
      border-radius: 100px;
      border: 2px solid transparent;
      border-top-color: var(--pink);
      animation: spin 0.75s linear infinite;
    }

    #waves {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 62px;
    }
    #waves.show { display: flex; }
    .bar {
      width: 3px;
      border-radius: 6px;
      background: var(--pink);
      animation: pulse 1.1s ease-in-out infinite;
    }
    .bar:nth-child(1) { animation-delay: 0.0s; }
    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.2s; }
    .bar:nth-child(6) { animation-delay: 0.1s; }
    .bar:nth-child(7) { animation-delay: 0.0s; }

    #endBtn {
      display: none;
      margin-top: 32px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      border-radius: 100px;
      padding: 11px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    #endBtn:hover { color: #fff; border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.04); }
    #endBtn.show { display: block; }

    #errBox {
      display: none;
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(255,40,40,0.12);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 12px; color: rgba(255,160,160,0.95);
      letter-spacing: 0.5px;
      max-width: 420px; text-align: center;
      backdrop-filter: blur(12px);
    }
    #errBox.show { display: block; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { height: 6px;  opacity: 0.25; }
      50%       { height: 52px; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="stage">
    <div class="brand">Modpaper<em>.</em></div>
    <div id="status">Secure link ready</div>

    <button id="startBtn" onclick="handleStart()">Authorize Agent</button>

    <div id="waves">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <button id="endBtn" onclick="handleEnd()">End Session</button>
  </div>

  <div id="errBox"></div>

  <vogent-web-widget
    id="mp-agent"
    style="display:none"
    public-api-key="pub_vogent_JCoBZQUcfXTeRnVi5JytvN0JBz09kWkW"
    call-agent-id="3eae1d60-e8f2-48a6-a944-89aed8ea8b75">
  </vogent-web-widget>

  <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>

  <script>
    const startBtn = document.getElementById('startBtn');
    const endBtn   = document.getElementById('endBtn');
    const status   = document.getElementById('status');
    const waves    = document.getElementById('waves');
    const errBox   = document.getElementById('errBox');
    let widget     = null;
    let active     = false;

    async function getWidget() {
      if (widget) return widget;
      if (customElements.get('vogent-web-widget') === undefined) {
        await customElements.whenDefined('vogent-web-widget');
      }
      widget = document.getElementById('mp-agent');
      customElements.upgrade(widget);
      await new Promise(r => setTimeout(r, 0));
      return widget;
    }

    function findMethod(el, patterns) {
      const proto = Object.getPrototypeOf(el);
      const names = [
        ...Object.getOwnPropertyNames(el),
        ...Object.getOwnPropertyNames(proto),
      ];
      for (const pat of patterns) {
        const hit = names.find(n => pat.test(n) && typeof el[n] === 'function');
        if (hit) return hit;
      }
      return null;
    }

    async function handleStart() {
      clearError();
      startBtn.disabled = true;
      startBtn.classList.add('connecting');
      setStatus('Establishing link…');

      try {
        const w = await getWidget();

        let method = null;
        for (let i = 0; i < 10; i++) {
          method = findMethod(w, [/^startCall$/i, /^start$/i, /^beginCall$/i, /^connect$/i, /^call$/i]);
          if (method) break;
          await new Promise(r => setTimeout(r, 150));
        }

        if (!method) {
          const all = [
            ...Object.getOwnPropertyNames(w),
            ...Object.getOwnPropertyNames(Object.getPrototypeOf(w)),
          ].filter(n => typeof w[n] === 'function' && n !== 'constructor');
          throw new Error('No start method found. Available: ' + (all.join(', ') || 'none'));
        }

        await w[method]();

        active = true;
        startBtn.style.display = 'none';
        startBtn.classList.remove('connecting');
        waves.classList.add('show');
        endBtn.classList.add('show');
        setStatus('Sovereign link active', 'pink');

        ['call-ended','callEnded','ended','disconnected'].forEach(evt =>
          w.addEventListener(evt, handleEnd, { once: true })
        );

      } catch (e) {
        startBtn.disabled = false;
        startBtn.classList.remove('connecting');
        setStatus('Secure link ready');
        showError(e.message || 'Connection failed — check console for details.');
        console.error('[Modpaper] Vogent init error:', e);
      }
    }

    function handleEnd() {
      if (!active) return;
      active = false;

      const w = widget;
      if (w) {
        const stop = findMethod(w, [/^endCall$/i, /^end$/i, /^stop$/i, /^disconnect$/i, /^hangup$/i]);
        if (stop) { try { w[stop](); } catch(_) {} }
      }

      waves.classList.remove('show');
      endBtn.classList.remove('show');
      startBtn.style.display  = '';
      startBtn.disabled = false;
      setStatus('Session ended', 'dim');
      setTimeout(() => setStatus('Secure link ready'), 2200);
    }

    function setStatus(text, cls) {
      status.textContent = text;
      status.className = cls || '';
    }

    function showError(msg) {
      errBox.textContent = msg;
      errBox.classList.add('show');
      setTimeout(() => errBox.classList.remove('show'), 7000);
    }

    function clearError() {
      errBox.classList.remove('show');
    }
  </script>
</body>
</html>
