<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modpaper Voice Demo</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- Vogent -->
  <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Syne", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .brand {
      font-size: 72px;
      font-weight: 800;
    }

    .dot { color: #ff00cc; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 4px;
      color: #ff00cc;
    }

    button {
      margin-top: 40px;
      padding: 14px 28px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="brand">Modpaper<span class="dot">.</span></div>
  <div id="status" class="status">READY</div>

  <button id="startBtn">Launch Agent</button>

<script>
let agent;

window.addEventListener("load", () => {
  // 🔥 THIS is the missing piece
  agent = new Vogent({
    agentId: "3eae1d60-e8f2-48a6-a944-89aed8ea0b75"
  });

  console.log("Agent initialized:", agent);
});

async function launchAgent() {
  const status = document.getElementById("status");

  try {
    // 1. Unlock mic
    await navigator.mediaDevices.getUserMedia({ audio: true });

    // 2. Unlock audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();

    status.innerText = "CONNECTING...";

    // 3. Start REAL call (now tied to your agent)
    await agent.startCall();

    status.innerText = "SOVEREIGN LINK ACTIVE";

  } catch (err) {
    console.error(err);
    status.innerText = "ERROR";
  }
}

document.getElementById("startBtn").addEventListener("click", launchAgent);
</script>

</body>
</html>
