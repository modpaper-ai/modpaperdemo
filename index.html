<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modpaper Voice Demo</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- Vogent Widget -->
  <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Syne", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .brand {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -2px;
    }

    .dot {
      color: #ff00cc;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 4px;
      color: #ff00cc;
    }

    button {
      margin-top: 40px;
      background: #fff;
      color: #000;
      border: none;
      padding: 14px 28px;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .waves {
      display: none;
      margin-top: 40px;
      gap: 4px;
    }

    .bar {
      width: 4px;
      height: 10px;
      background: #ff00cc;
      animation: bounce 1s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { height: 10px; opacity: 0.3; }
      50% { height: 40px; opacity: 1; }
    }

    .debug {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="brand">Modpaper<span class="dot">.</span></div>
  <div id="status" class="status">READY</div>

  <button id="startBtn">Launch Agent</button>

  <div id="waves" class="waves">
    <div class="bar" style="animation-delay: 0s"></div>
    <div class="bar" style="animation-delay: 0.1s"></div>
    <div class="bar" style="animation-delay: 0.2s"></div>
    <div class="bar" style="animation-delay: 0.3s"></div>
    <div class="bar" style="animation-delay: 0.4s"></div>
  </div>

  <div id="debug" class="debug">idle</div>

<script>
let audioCtx;

async function launchAgent() {
  const btn = document.getElementById("startBtn");
  const waves = document.getElementById("waves");
  const status = document.getElementById("status");
  const debug = document.getElementById("debug");

  try {
    debug.innerText = "requesting mic...";

    // 1. Request mic access (must be user-triggered)
    await navigator.mediaDevices.getUserMedia({ audio: true });

    debug.innerText = "mic granted";

    // 2. Create AudioContext
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 3. CRITICAL: Resume audio context
    if (audioCtx.state === "suspended") {
      await audioCtx.resume();
    }

    debug.innerText = "audio unlocked";

    // 4. UI updates
    btn.style.display = "none";
    waves.style.display = "flex";
    status.innerText = "SOVEREIGN LINK ACTIVE";

    // 5. Small delay ensures browser fully unlocks audio
    await new Promise(r => setTimeout(r, 200));

    debug.innerText = "starting call...";

    // 6. Start Vogent call safely
    if (window.vogent && typeof window.vogent.startCall === "function") {
      window.vogent.startCall();
      debug.innerText = "call started";
    } else {
      debug.innerText = "vogent not ready";
      console.error("Vogent not loaded");
    }

  } catch (err) {
    console.error(err);
    status.innerText = "MIC REQUIRED";
    status.style.color = "red";
    debug.innerText = "error: " + err.message;
  }
}

// Attach click handler
document.getElementById("startBtn").addEventListener("click", launchAgent);
</script>

</body>
</html>
