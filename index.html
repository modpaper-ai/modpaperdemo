<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modpaper AI | Sovereign Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FF00FF; --black: #000000; }
        body {
            background: var(--black); color: white; margin: 0; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'DM Sans', sans-serif; overflow: hidden;
        }
        .brand { 
            font-family: 'Syne', sans-serif; font-size: clamp(48px, 10vw, 80px); 
            letter-spacing: -4px; margin-bottom: 10px; 
        }
        .brand span { color: var(--pink); }
        #status { 
            font-size: 11px; text-transform: uppercase; letter-spacing: 4px; 
            color: rgba(255,255,255,0.4); margin-bottom: 40px; 
            transition: color 0.3s ease;
        }
        
        #startBtn {
            background: white; color: black; border: none; padding: 22px 72px; 
            border-radius: 100px; font-family: 'Syne', sans-serif; font-weight: 800;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        #startBtn:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255,0,255,0.3); }

        /* Vapi-style Visualizer */
        #waves { display: none; gap: 6px; height: 60px; align-items: center; }
        .bar { width: 4px; height: 15px; background: var(--pink); border-radius: 10px; animation: pulse 1s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { height: 12px; opacity: 0.3; } 50% { height: 60px; opacity: 1; } }
    </style>
</head>
<body>

    <div class="brand">Modpaper<span>.</span></div>
    <div id="status">Secure link ready</div>
    
    <button id="startBtn" onclick="initiateSovereignCall()">Authorize Agent</button>

    <div id="waves">
        <div class="bar" style="animation-delay: 0.0s"></div>
        <div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.3s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.0s"></div>
    </div>

    <vogent-web-widget 
        id="mp-agent"
        public-api-key="pub_vogent_JCoBZQUcfXTeRnVi5JytvN0JBz09kWkW" 
        call-agent-id="3eae1d60-e8f2-48a6-a944-89aed8ea8b75">
    </vogent-web-widget>

    <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>

    <script>
        async function initiateSovereignCall() {
            const widget = document.getElementById('mp-agent');
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('status');
            const waves = document.getElementById('waves');

            try {
                // 1. UNLOCK AUDIO: Critical for hearing the AI's first words
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                // 2. UI TRANSITION: Instant feedback
                btn.style.display = 'none';
                waves.style.display = 'flex';
                status.innerText = "Sovereign Link Active";
                status.style.color = "var(--pink)";

                // 3. LAUNCH AGENT: Handshake with 3eae1d60-e8f2-48a6-a944-89aed8ea8b75
                if (widget && typeof widget.startCall === 'function') {
                    widget.startCall();
                }
            } catch (err) {
                console.error("Link failed:", err);
                status.innerText = "Link Error: Check Permissions";
                status.style.color = "#FF4B4B";
            }
        }
    </script>
</body>
</html>
