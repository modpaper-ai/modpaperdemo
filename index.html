<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modpaper AI | Sovereign Link</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>

  <style>
    :root { --mp-pink: #FF00FF; --mp-black: #000000; }
    body {
      background-color: var(--mp-black);
      color: white;
      margin: 0; height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      font-family: sans-serif;
      overflow: hidden;
    }
    .brand { font-size: 3.5rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -2px; }
    .brand span { color: var(--mp-pink); }
    #status { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 50px; text-transform: uppercase; letter-spacing: 3px; }
    
    #start-btn {
      background: white; color: black; border: none;
      padding: 22px 60px; font-size: 1.1rem; font-weight: 700;
      border-radius: 100px; cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }
    #start-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 0, 255, 0.4); }
    #start-btn:disabled { opacity: 0.2; cursor: wait; }

    /* Pulsing Visualizer */
    #viz { display: none; width: 60px; height: 60px; background: var(--mp-pink); border-radius: 50%; animation: pulse 1s infinite alternate; box-shadow: 0 0 20px var(--mp-pink); }
    @keyframes pulse { from { transform: scale(0.8); opacity: 0.5; } to { transform: scale(1.2); opacity: 1; } }
  </style>
</head>
<body>

  <div class="brand">Modpaper<span>.</span></div>
  <div id="status">Linking to Infrastructure...</div>
  
  <button id="start-btn" disabled>Authorize Agent</button>
  <div id="viz"></div>

  <vogent-web-widget 
    id="mp-agent"
    public-api-key="pub_vogent_JCoBZQUcfXTeRnVi5JytvN0JBz09kWkW" 
    call-agent-id="3eae1d60-e8f2-48a6-a944-89aed8ea8b75">
  </vogent-web-widget>

  <script>
    const widget = document.getElementById('mp-agent');
    const btn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const viz = document.getElementById('viz');

    // 2. Ensure the widget is registered before allowing clicks
    customElements.whenDefined('vogent-web-widget').then(() => {
      btn.disabled = false;
      status.innerText = "System Ready";
    });

    btn.addEventListener('click', async () => {
      try {
        // 3. Request Mic Access FIRST (The "Unicorn" way)
        await navigator.mediaDevices.getUserMedia({ audio: true });
        
        status.innerText = "Sovereign Link Active";
        status.style.color = "var(--mp-pink)";
        btn.style.display = 'none';
        viz.style.display = 'block';

        // 4. Fire the CTO's method
        if (widget && typeof widget.startCall === 'function') {
            widget.startCall();
        } else {
            console.error("Widget method 'startCall' not found. Check script load.");
        }
      } catch (err) {
        status.innerText = "Error: Mic Access Required";
        status.style.color = "red";
      }
    });
  </script>
</body>
</html>
