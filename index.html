<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modpaper AI | Sovereign Link</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>

  <style>
    :root { --mp-pink: #FF00FF; --mp-black: #000000; }
    body {
      background-color: var(--mp-black);
      color: white;
      margin: 0; height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    .brand { font-size: 4rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -3px; }
    .brand span { color: var(--mp-pink); }
    
    #status {
      font-size: 0.75rem; color: rgba(255,255,255,0.4);
      margin-bottom: 60px; text-transform: uppercase; letter-spacing: 4px;
    }

    #start-btn {
      background: white; color: black; border: none;
      padding: 24px 70px; font-size: 1rem; font-weight: 800;
      border-radius: 100px; cursor: pointer;
      transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      text-transform: uppercase;
    }

    #start-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(255, 0, 255, 0.25);
    }

    /* Active Visualizer */
    .viz-box {
      display: none; height: 80px; align-items: center; gap: 10px;
    }
    .wave {
      width: 8px; height: 20px; background: var(--mp-pink);
      border-radius: 20px; animation: wave 1s infinite ease-in-out;
    }
    @keyframes wave {
      0%, 100% { height: 20px; opacity: 0.4; }
      50% { height: 80px; opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="brand">Modpaper<span>.</span></div>
  <div id="status">Secure Link Ready</div>
  
  <button id="start-btn">Authorize Agent</button>

  <div class="viz-box" id="viz">
    <div class="wave"></div><div class="wave" style="animation-delay: 0.1s"></div>
    <div class="wave" style="animation-delay: 0.2s"></div><div class="wave" style="animation-delay: 0.3s"></div>
  </div>

  <vogent-web-widget 
    id="mp-agent"
    public-api-key="pub_vogent_JCoBZQUcfXTeRnVi5JytvN0JBz09kWkW" 
    call-agent-id="3eae1d60-e8f2-48a6-a944-89aed8ea8b75">
  </vogent-web-widget>

  <script>
    const widget = document.getElementById('mp-agent');
    const btn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const viz = document.getElementById('viz');

    btn.addEventListener('click', () => {
      // Direct call to start the agent
      if (widget && typeof widget.startCall === 'function') {
        widget.startCall();
        
        // Instant UI Transition
        btn.style.display = 'none';
        viz.style.display = 'flex';
        status.innerText = "Sovereign Link Active";
        status.style.color = "var(--mp-pink)";
      }
    });
  </script>
</body>
</html>
