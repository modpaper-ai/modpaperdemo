<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modpaper AI | Sovereign Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>
    <style>
        :root { --pink: #FF00FF; --black: #000000; }
        body {
            background: var(--black); color: white; margin: 0; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'DM Sans', sans-serif; overflow: hidden;
        }
        .brand {
            font-family: 'Syne', sans-serif; font-size: clamp(40px, 8vw, 80px);
            font-weight: 800; letter-spacing: -3px; margin-bottom: 10px;
        }
        .brand span { color: var(--pink); }
        #status {
            font-size: 12px; text-transform: uppercase; letter-spacing: 4px;
            color: rgba(255,255,255,0.4); margin-bottom: 40px;
        }
        #action-btn {
            background: white; color: black; border: none;
            padding: 20px 60px; border-radius: 100px;
            font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 2px;
        }
        #action-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(255,0,255,0.4); }
        
        /* The Waveform Visualizer */
        #viz { display: none; gap: 6px; height: 50px; align-items: center; }
        .bar { width: 4px; height: 15px; background: var(--pink); border-radius: 10px; animation: pulse 1s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { height: 10px; opacity: 0.3; } 50% { height: 50px; opacity: 1; } }
    </style>
</head>
<body>

    <div class="brand">Modpaper<span>.</span></div>
    <div id="status">Secure link ready</div>
    
    <button id="action-btn">Authorize Agent</button>

    <div id="viz">
        <div class="bar" style="animation-delay: 0s"></div>
        <div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.3s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.1s"></div>
    </div>

    <vogent-web-widget 
        id="mp-agent"
        public-api-key="pub_vogent_JCoBZQUcfXTeRnVi5JytvN0JBz09kWkW" 
        call-agent-id="3eae1d60-e8f2-48a6-a944-89aed8ea8b75">
    </vogent-web-widget>

    <script>
        const btn = document.getElementById('action-btn');
        const widget = document.getElementById('mp-agent');
        const status = document.getElementById('status');
        const viz = document.getElementById('viz');

        btn.addEventListener('click', async () => {
            try {
                // 1. Request Mic
                await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 2. UI Switch
                btn.style.display = 'none';
                viz.style.display = 'flex';
                status.innerText = "Sovereign Link Active";
                status.style.color = "var(--pink)";

                // 3. Simple, Direct Call (As per CTO)
                widget.startCall();
                
            } catch (err) {
                status.innerText = "Access Denied: Mic Required";
                status.style.color = "red";
                console.error(err);
            }
        });
    </script>
</body>
</html>
