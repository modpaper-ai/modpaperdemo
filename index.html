<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modpaper AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>
  <style>
    body {
      background-color: #000000;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .logo { font-size: 2.5rem; font-weight: bold; margin-bottom: 2rem; }
    #start-btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 20px 50px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
    }

</head>
<body>

  <div class="logo">Modpaper AI</div>
  <button id="start-btn">Start AI Call</button>

  <vogent-web-widget 
    id="my-agent"
    public-api-key="pub_vogent_JCoBZQUcfXTeRnVi5JytvN0JBz09kWkW" 
    call-agent-id="3eae1d60-e8f2-48a6-a944-89aed8ea8b75">
  </vogent-web-widget>

  <script>
    const widget = document.getElementById('my-agent');
    const btn = document.getElementById('start-btn');

    btn.addEventListener('click', () => {
      // This is the specific method the CTO mentioned
      widget.startCall(); 
    });
  </script>
</body>
</html>
