<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modpaper AI | Sovereign Link</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@vogent/web-widget@latest/dist/index.js"></script>

  <style>
    :root { --mp-pink: #FF00FF; --mp-black: #000000; }
    body {
      background-color: var(--mp-black);
      color: white;
      margin: 0; height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      font-family: sans-serif;
    }
    .brand { font-size: 3.5rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -2px; }
    .brand span { color: var(--mp-pink); }
    #status { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 50px; text-transform: uppercase; letter-spacing: 3px; }
    
    #start-btn {
      background: white; color: black; border: none;
      padding: 22px 60px; font-size: 1.1rem; font-weight: 700;
      border-radius: 100px; cursor: pointer;
      text-transform: uppercase;
    }
    #start-btn:hover { box-shadow: 0 0 30px rgba(255, 0, 255, 0.4); }

    /* Pulsing Active State */
    #active-pulse { display: none; width: 50px; height: 50px; background: var(--mp-pink); border-radius: 50%; animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { transform: scale(0.8); opacity: 0.5; } to { transform: scale(1.2); opacity: 1; } }
  </style>
</head>
<body>

  <div class="brand">Modpaper<span>.</span></div>
  <div id="status">Ready for Deployment</div>
  
  <button id="start-btn">Authorize Agent</button>
  <div id="active-pulse"></div>

  <vogent-web-widget 
    id="mp-agent"
    public-api-key="pub_vogent_JCoBZQUcfXTeRnVi5JytvN0JBz09kWkW" 
    call-agent-id="3eae1d60-e8f2-48a6-a944-89aed8ea8b75">
  </vogent-web-widget>

  <script>
    const btn = document.getElementById('start-btn');
    const widget = document.getElementById('mp-agent');
    const status = document.getElementById('status');
    const pulse = document.getElementById('active-pulse');

    btn.addEventListener('click', async () => {
      try {
        // 1. Force Mic Access
        await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // 2. UI Transition
        status.innerText = "Sovereign Link Active";
        status.style.color = "var(--mp-pink)";
        btn.style.display = 'none';
        pulse.style.display = 'block';

        // 3. Direct Method Call (Override wait)
        if (widget && widget.startCall) {
            widget.startCall();
        } else {
            // Fallback for custom element lag
            const el = document.querySelector('vogent-web-widget');
            if (el) el.startCall();
        }
      } catch (err) {
        status.innerText = "Error: Mic Access Required";
        status.style.color = "red";
      }
    });
  </script>
</body>
</html>
